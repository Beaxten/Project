<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div id="admin-wrapper" style="display:none;">
        <h3 class="page-title">Manage Users</h3>
        <div
            style="background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;">
            <table class="mini-table" id="users-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Account No.</th>
                        <th>Balance</th>
                        <th>Role</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../components/AdminLayout.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            buildAdminLayout("users");

            try {
                const users = await apiAdminGetUsers();
                const tbody = document.querySelector("#users-table tbody");

                if (users && Array.isArray(users)) {
                    if (users.length === 0) {
                        tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>No users found.</td></tr>";
                    }
                    users.forEach(u => {
                        const bal = u.balance !== undefined && u.balance !== null ? "PKR " + Number(u.balance).toLocaleString() : "—";
                        const acc = u.account_number || "—";
                        const roleClass = u.role === "admin" ? "badge-p" : "badge-b";
                        const statusClass = u.is_active ? "badge-g" : "badge-r";

                        const row = `<tr>
                           <td>${u.name}</td>
                           <td style="color:var(--color-text-secondary);">${u.email}</td>
                           <td style="font-family:monospace;">${acc}</td>
                           <td>${bal}</td>
                           <td><span class="${roleClass}">${u.role}</span></td>
                           <td><span class="${statusClass}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                }
            } catch (e) {
                console.error(e);
            }
        });
    </script>
</body>

</html>
