<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Bank - Register</title>

  <link rel="stylesheet" href="register.css">
</head>

<body>

  <div class="container">

    <form class="form" id="registerForm">

      <div class="header">
        <h1>Smart Bank</h1>
        <p>Create your account</p>
      </div>

      <div class="input-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" placeholder="Enter your full name" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" required>
      </div>

      <div class="input-group">
        <label for="confirm">Confirm Password</label>
        <input id="confirm" type="password" placeholder="Confirm your password" required>
      </div>

      <div class="input-group">
        <label for="cnic">CNIC</label>
        <input id="cnic" type="text" placeholder="xxxxxxxxxxxxx" required>
      </div>

      <button type="submit">Register</button>

      <!-- 🔹 Login Link -->
      <p class="switch">
        Already have an account?
        <a href="login.html">Login here</a>
      </p>

    </form>

  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      const cnic = document.getElementById("cnic").value;

      if (password !== confirm) {
        alert("Passwords don't match");
        return;
      }

      if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
      }

      if (!/^\d{13}$/.test(cnic)) {
        alert("CNIC must be exactly 13 digits");
        return;
      }

      try {
        const data = await apiRegister(name, email, password, cnic);

        if (data.message) {
          alert(data.message);
          window.location.href = "login.html";
        } else {
          alert(data.error || "Registration Failed");
        }

      } catch (error) {
        alert("Server error. Try again.");
        console.error(error);
      }
    });
  </script>

</body>
</html>
